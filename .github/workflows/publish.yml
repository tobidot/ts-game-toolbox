name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: Publish
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@game.object'
      
      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view @game.object/ts-game-toolbox@$VERSION > /dev/null 2>&1; then
            echo "Version $VERSION already exists on NPM. Skipping publish."
          else
            npm publish --access public
          fi
