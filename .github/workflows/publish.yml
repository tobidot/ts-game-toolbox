name: Publish to NPM

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          scope: '@game.object'
      
      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM_AUTH_TOKEN }}

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to NPM
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NODE_AUTH_TOKEN is empty. Please check if NPM_TOKEN or NPM_AUTH_TOKEN secret is set in your repository settings."
            echo "If you are using Environments, make sure the environment is specified in the workflow."
            exit 1
          fi
          echo "Token is present (length: ${#NODE_AUTH_TOKEN})."
          VERSION=$(node -p "require('./package.json').version")
          if npm view @game.object/ts-game-toolbox@$VERSION > /dev/null 2>&1; then
            echo "Version $VERSION already exists on NPM. Skipping publish."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN || secrets.NPM_AUTH_TOKEN }}
